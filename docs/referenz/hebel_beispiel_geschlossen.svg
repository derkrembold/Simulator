<svg xmlns="http://www.w3.org/2000/svg" width="88" height="76" viewBox="0 0 88 76">
  <!-- Weisse Box: fest, Position/Groesse aendert sich nie -->
  <rect x="20" y="20" width="48" height="36" fill="#f5f5f5" stroke="#555555" stroke-width="1.2"/>

  <!-- Hilfslinie: Box-Mittelpunkt = Drehpunkt des Hebels (nur zur Kontrolle, kein Teil des echten Designs) -->
  <circle cx="44" cy="38" r="1.2" fill="red"/>

  <!-- Hebel: eigener Rahmen um Balken+Riffelung, Balken oben, 3 Riffel-Linien darunter -
       Drehpunkt (unten, horizontal mittig) liegt auf dem Box-Mittelpunkt, die untere
       Rahmenkante des Hebels geht im geschlossenen Zustand genau durch den Drehpunkt -->
  <g id="hebel">
    <rect x="24" y="24" width="40" height="14" fill="none" stroke="#222222" stroke-width="1"/>
    <rect x="24" y="24" width="40" height="4" fill="#222222"/>
    <line x1="26" y1="30" x2="62" y2="30" stroke="#222222" stroke-width="1"/>
    <line x1="26" y1="33" x2="62" y2="33" stroke="#222222" stroke-width="1"/>
    <line x1="26" y1="36" x2="62" y2="36" stroke="#222222" stroke-width="1"/>
  </g>
</svg>
