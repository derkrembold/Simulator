<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="90mm" height="90mm" viewBox="0 0 90 90" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!-- Gehaeuse: quadratisch, wie im Referenzbild (keine abgerundeten Ecken) -->
  <rect x="0.5" y="0.5" width="89" height="89" rx="2" ry="2" fill="none" stroke="#000000" stroke-width="1.05648"/>

  <!-- Wago-Klemme: Block-Rechteck (hellgrau) + 2 orangene Klemmdeckel +
       grauer Kontaktkreis + farbiger Kennzeichnungskreis. Relative Offsets
       aus dem Referenzbild exakt vermessen (in allen 5 Bloecken dort
       bereits identisch) - hier werden nur die 5 Block-Mittelpunkte selbst
       sauber ausgerichtet (Zeilen exakt horizontal, gleicher Abstand). -->

  <!-- N: oben links -->
  <g id="klemme-n">
    <rect x="7.357" y="13.406" width="21.887" height="10.689" fill="#ececec"/>
    <rect x="8.375" y="10.961" width="8.653" height="2.290" fill="#ff7f2a"/>
    <rect x="19.020" y="10.961" width="8.653" height="2.290" fill="#ff7f2a"/>
    <circle cx="13.494" cy="18.818" r="3.054" fill="#666666"/>
    <circle cx="23.026" cy="19.029" r="3.054" fill="#0000ff"/>
  </g>

  <!-- PE: oben mitte -->
  <g id="klemme-pe">
    <rect x="34.057" y="13.406" width="21.887" height="10.689" fill="#ececec"/>
    <rect x="35.075" y="10.961" width="8.653" height="2.290" fill="#ff7f2a"/>
    <rect x="45.720" y="10.961" width="8.653" height="2.290" fill="#ff7f2a"/>
    <circle cx="40.194" cy="18.818" r="3.054" fill="#666666"/>
    <circle cx="49.726" cy="19.029" r="3.054" fill="#44aa00"/>
  </g>

  <!-- L1 (braun): oben rechts -->
  <g id="klemme-l1">
    <rect x="60.757" y="13.406" width="21.887" height="10.689" fill="#ececec"/>
    <rect x="61.775" y="10.961" width="8.653" height="2.290" fill="#ff7f2a"/>
    <rect x="72.420" y="10.961" width="8.653" height="2.290" fill="#ff7f2a"/>
    <circle cx="66.894" cy="18.818" r="3.054" fill="#666666"/>
    <circle cx="76.426" cy="19.029" r="3.054" fill="#806600"/>
  </g>

  <!-- L3 (grau): unten links -->
  <g id="klemme-l3">
    <rect x="20.207" y="70.556" width="21.887" height="10.689" fill="#ececec"/>
    <rect x="21.225" y="68.111" width="8.653" height="2.290" fill="#ff7f2a"/>
    <rect x="31.870" y="68.111" width="8.653" height="2.290" fill="#ff7f2a"/>
    <circle cx="26.344" cy="75.968" r="3.054" fill="#666666"/>
    <circle cx="35.876" cy="76.179" r="3.054" fill="#b3b3b3"/>
  </g>

  <!-- L2 (schwarz): unten rechts -->
  <g id="klemme-l2">
    <rect x="47.907" y="70.556" width="21.887" height="10.689" fill="#ececec"/>
    <rect x="48.925" y="68.111" width="8.653" height="2.290" fill="#ff7f2a"/>
    <rect x="59.570" y="68.111" width="8.653" height="2.290" fill="#ff7f2a"/>
    <circle cx="54.044" cy="75.968" r="3.054" fill="#666666"/>
    <circle cx="63.576" cy="76.179" r="3.054" fill="#000000"/>
  </g>
</svg>
