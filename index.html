<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>TREI Prüfungs-Simulator</title>
  <style>
    body { font-family: sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
    #schaltkasten { background: #fff; }
    #steckdosen { margin-bottom: 20px; }
    #messgeraet { margin-top: 20px; display: flex; justify-content: center; }
    #protokoll { margin-top: 20px; }
    /* Schnelles Mehrfachklicken (Messspitzen-Zyklus, Drehknopf, ▲/▼/◄►) löst
       sonst die native Doppelklick-Textauswahl des Browsers aus, die zufällig
       Text irgendwo in der SVG markiert (z.B. "INSTALLATIONSTESTER" blau markiert). */
    #schaltkasten, #messgeraet {
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
    }
    .popup {
      position: fixed;
      display: none;
      background: #222;
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
      transform: translate(-50%, -120%);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="steckdosen"></div>
  <div id="schaltkasten"></div>
  <div id="messgeraet"></div>
  <div id="protokoll"></div>
  <script type="module" src="controller/app.js"></script>
</body>
</html>
